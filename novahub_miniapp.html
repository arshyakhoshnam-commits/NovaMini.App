<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NOVAHUB</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg-0:#070b0e;
    --bg-1:#0e151a;
    --panel:#121a20;
    --panel-2:#17212a;
    --line:#23303a;
    --accent:#34d399;
    --accent-2:#38bdf8;
    --text-0:#eaf2ef;
    --text-1:#9fb0b6;
    --text-2:#5e6e75;
    --danger:#fb7185;
    --radius:18px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg-0);
    color:var(--text-0);
    font-family:"Vazirmatn", system-ui, sans-serif;
    overscroll-behavior:none;
  }
  #tunnel{
    position:fixed; inset:0; width:100%; height:100%; z-index:0;
    background:radial-gradient(120% 90% at 50% -10%, #0f1c1e 0%, var(--bg-0) 60%);
  }
  .app{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column;
    padding:18px 16px 28px;
    max-width:480px; margin:0 auto;
  }

  /* ---------- Header ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:26px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .logo{
    width:36px; height:36px; border-radius:11px;
    background:linear-gradient(145deg, var(--accent), #0f9d6c);
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:17px; color:#06140f;
    box-shadow:0 0 0 1px rgba(255,255,255,.06), 0 6px 18px -6px rgba(52,211,153,.55);
  }
  .brand-name{ font-weight:800; font-size:16.5px; letter-spacing:.2px; }
  .status-pill{
    display:flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:999px;
    font-size:12px; font-weight:600;
    background:var(--panel); border:1px solid var(--line); color:var(--text-1);
    transition:all .25s ease;
  }
  .status-pill.on{ color:var(--accent); border-color:rgba(52,211,153,.35); background:rgba(52,211,153,.08); }
  .status-dot{ width:7px; height:7px; border-radius:50%; background:var(--text-2); }
  .status-pill.on .status-dot{ background:var(--accent); box-shadow:0 0 8px var(--accent); }

  /* ---------- Hero ---------- */
  .hero{ text-align:center; padding:18px 6px 30px; }
  .hero h1{
    margin:0 0 8px; font-size:23px; font-weight:800; line-height:1.55;
  }
  .hero h1 span{ color:var(--accent); }
  .hero p{ margin:0; font-size:13.5px; color:var(--text-1); line-height:1.9; }

  /* ---------- Cards ---------- */
  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
    backdrop-filter:blur(6px);
  }
  .account-row{ display:flex; align-items:center; gap:12px; }
  .avatar{
    width:46px; height:46px; border-radius:50%;
    background:var(--bg-1); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:16px; color:var(--text-1);
    overflow:hidden; flex-shrink:0;
  }
  .avatar img{ width:100%; height:100%; object-fit:cover; }
  .account-info{ flex:1; min-width:0; }
  .account-name{ font-weight:700; font-size:14.5px; }
  .account-sub{ font-size:12px; color:var(--text-2); margin-top:2px; }

  .divider{ height:1px; background:var(--line); margin:14px 0; }

  .row{ display:flex; align-items:center; justify-content:space-between; }
  .row + .row{ margin-top:10px; }
  .row .label{ font-size:13px; color:var(--text-1); }
  .row .value{ font-size:13px; font-weight:700; }
  .value.muted{ color:var(--text-2); font-weight:500; }
  .value.good{ color:var(--accent); }

  /* ---------- Buttons ---------- */
  .btn{
    width:100%; border:none; border-radius:14px;
    padding:15px 16px; font-family:inherit;
    font-size:14.5px; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:8px;
    cursor:pointer; transition:transform .12s ease, opacity .2s ease;
  }
  .btn:active{ transform:scale(.97); }
  .btn-primary{
    background:linear-gradient(135deg, var(--accent), #1fb37e);
    color:#04130d;
    box-shadow:0 10px 24px -10px rgba(52,211,153,.65);
  }
  .btn-locked{
    background:var(--panel-2); color:var(--text-2);
    border:1px solid var(--line);
  }
  .btn-ghost{
    background:transparent; color:var(--accent-2);
    border:1px solid rgba(56,189,248,.35);
  }
  .btn-block{ margin-top:10px; }

  /* ---------- Config ticket ---------- */
  .ticket{
    border:1px dashed rgba(52,211,153,.4);
    border-radius:14px; padding:14px;
    background:rgba(52,211,153,.05);
    margin-top:4px;
  }
  .ticket-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
  }
  .ticket-head span{ font-size:12px; color:var(--text-1); font-weight:600; }
  .ticket code{
    display:block; font-family:"JetBrains Mono", monospace;
    font-size:11.5px; color:var(--text-0);
    word-break:break-all; line-height:1.7;
  }
  .copy-btn{
    border:none; background:var(--panel-2); color:var(--accent);
    font-family:inherit; font-size:11.5px; font-weight:700;
    padding:6px 10px; border-radius:8px; cursor:pointer;
  }

  .stats{ display:flex; gap:10px; margin-top:4px; }
  .stat{
    flex:1; text-align:center; background:var(--panel-2);
    border:1px solid var(--line); border-radius:14px; padding:14px 8px;
  }
  .stat b{ display:block; font-size:19px; color:var(--text-0); }
  .stat span{ font-size:11px; color:var(--text-2); margin-top:4px; display:block; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#0c1418; border:1px solid var(--line); color:var(--text-0);
    padding:11px 18px; border-radius:12px; font-size:13px; font-weight:600;
    opacity:0; transition:all .25s ease; z-index:5; white-space:nowrap;
    box-shadow:0 10px 30px -10px rgba(0,0,0,.6);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .hint{ font-size:11.5px; color:var(--text-2); text-align:center; margin-top:10px; line-height:1.8; }
</style>
</head>
<body>

<canvas id="tunnel"></canvas>

<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="logo">N</div>
      <div class="brand-name">NOVAHUB</div>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="status-dot"></span>
      <span id="statusText">وریفای‌نشده</span>
    </div>
  </div>

  <div class="hero">
    <h1>اتصال امن، <span>یک لمس</span> با شما فاصله داره</h1>
    <p>وریفای کن، کانفیگ بگیر، وصل شو.</p>
  </div>

  <div class="card">
    <div class="account-row">
      <div class="avatar" id="avatar">?</div>
      <div class="account-info">
        <div class="account-name" id="userName">کاربر مهمان</div>
        <div class="account-sub" id="userSub">برای شروع وریفای کن</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="row">
      <span class="label">وضعیت وریفای</span>
      <span class="value muted" id="verifyValue">انجام نشده</span>
    </div>
    <div class="row">
      <span class="label">شماره ثبت‌شده</span>
      <span class="value muted" id="phoneValue">—</span>
    </div>
  </div>

  <div class="card">
    <button class="btn btn-locked" id="getConfigBtn">🔒 برای دریافت کانفیگ، اول وریفای کن</button>
    <button class="btn btn-ghost btn-block" id="verifyBtn">✅ وریفای با شماره تلگرام</button>

    <div class="ticket" id="ticket" style="display:none;">
      <div class="ticket-head">
        <span>کانفیگ شما</span>
        <button class="copy-btn" id="copyBtn">📋 کپی</button>
      </div>
      <code id="configText">—</code>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <b id="statConfigs">0</b>
      <span>کانفیگ دریافتی</span>
    </div>
    <div class="stat">
      <b id="statMember">#—</b>
      <span>شماره عضویت</span>
    </div>
  </div>

  <div class="hint">کانفیگ‌ها به‌صورت تصادفی از بین چند سرور فعال انتخاب می‌شن.</div>

</div>

<div class="toast" id="toast"></div>

<script>
  // ============ پس‌زمینه‌ی تونل متحرک ============
  const canvas = document.getElementById('tunnel');
  const ctx = canvas.getContext('2d');
  let w, h, cx, cy;
  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cx = w/2; cy = h*0.32;
  }
  resize();
  window.addEventListener('resize', resize);

  const STRANDS = 26;
  const strands = Array.from({length: STRANDS}, (_, i) => ({
    angle: (Math.PI * 2 / STRANDS) * i,
    speed: 0.18 + Math.random()*0.22,
    offset: Math.random()*1000,
    radius: 0.55 + Math.random()*0.45,
  }));

  function frame(t){
    ctx.clearRect(0,0,w,h);
    const maxR = Math.max(w,h) * 0.85;

    strands.forEach((s) => {
      const progress = ((t*0.00006*s.speed) + s.offset) % 1;
      const r0 = maxR * s.radius;
      const x1 = cx + Math.cos(s.angle) * r0;
      const y1 = cy + Math.sin(s.angle) * r0 * 0.6;
      const x2 = cx + Math.cos(s.angle) * r0 * (1-progress);
      const y2 = cy + Math.sin(s.angle) * r0 * 0.6 * (1-progress);

      const grad = ctx.createLinearGradient(x1,y1,x2,y2);
      grad.addColorStop(0, 'rgba(52,211,153,0)');
      grad.addColorStop(0.85, 'rgba(56,189,248,0.35)');
      grad.addColorStop(1, 'rgba(52,211,153,0.9)');

      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();

      ctx.beginPath();
      ctx.fillStyle = 'rgba(52,211,153,0.9)';
      ctx.arc(x2,y2,1.6,0,Math.PI*2);
      ctx.fill();
    });

    // هسته‌ی مرکزی
    const pulse = 3 + Math.sin(t*0.003)*1.5;
    const coreGrad = ctx.createRadialGradient(cx,cy,0,cx,cy,40+pulse);
    coreGrad.addColorStop(0, 'rgba(52,211,153,0.55)');
    coreGrad.addColorStop(1, 'rgba(52,211,153,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx,cy,40+pulse,0,Math.PI*2);
    ctx.fill();

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ============ Telegram WebApp ============
  const tg = window.Telegram ? window.Telegram.WebApp : null;
  if (tg){
    tg.ready();
    tg.expand();
    try{ tg.setHeaderColor('#070b0e'); }catch(e){}
    try{ tg.setBackgroundColor('#070b0e'); }catch(e){}
  }

  // ============ State (نسخه‌ی نمایشی - بعداً به ربات وصل می‌شه) ============
  const CONFIGS = [
    "vless://config-1-placeholder...",
    "vless://config-2-placeholder...",
    "vless://config-3-placeholder...",
  ];

  const state = {
    verified: false,
    phone: null,
    configsReceived: 0,
    memberNo: Math.floor(Math.random()*900)+100,
  };

  // ============ شناسایی کاربر تلگرام ============
  const tgUser = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
  const nameEl = document.getElementById('userName');
  const subEl = document.getElementById('userSub');
  const avatarEl = document.getElementById('avatar');

  if (tgUser){
    nameEl.textContent = tgUser.first_name + (tgUser.last_name ? ' ' + tgUser.last_name : '');
    subEl.textContent = tgUser.username ? '@' + tgUser.username : 'آیدی عددی: ' + tgUser.id;
    if (tgUser.photo_url){
      avatarEl.innerHTML = `<img src="${tgUser.photo_url}" alt="">`;
    } else {
      avatarEl.textContent = tgUser.first_name ? tgUser.first_name[0] : '👤';
    }
  }

  document.getElementById('statMember').textContent = '#' + state.memberNo;

  // ============ رندر ============
  const statusPill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  const verifyValue = document.getElementById('verifyValue');
  const phoneValue = document.getElementById('phoneValue');
  const getConfigBtn = document.getElementById('getConfigBtn');
  const verifyBtn = document.getElementById('verifyBtn');
  const ticket = document.getElementById('ticket');
  const configText = document.getElementById('configText');
  const statConfigs = document.getElementById('statConfigs');

  function render(){
    if (state.verified){
      statusPill.classList.add('on');
      statusText.textContent = 'وریفای‌شده';
      verifyValue.textContent = '✅ انجام شده';
      verifyValue.classList.remove('muted');
      verifyValue.classList.add('good');
      phoneValue.textContent = state.phone || '—';
      phoneValue.classList.remove('muted');

      getConfigBtn.className = 'btn btn-primary';
      getConfigBtn.textContent = '📥 دریافت کانفیگ';
      verifyBtn.style.display = 'none';
    } else {
      statusPill.classList.remove('on');
      statusText.textContent = 'وریفای‌نشده';
      verifyValue.textContent = 'انجام نشده';
      verifyValue.classList.add('muted');
      verifyValue.classList.remove('good');
      phoneValue.textContent = '—';

      getConfigBtn.className = 'btn btn-locked';
      getConfigBtn.textContent = '🔒 برای دریافت کانفیگ، اول وریفای کن';
      verifyBtn.style.display = 'flex';
    }
    statConfigs.textContent = state.configsReceived;
  }
  render();

  function showToast(msg){
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=> toast.classList.remove('show'), 2200);
  }

  // ============ وریفای با شماره‌ی تلگرام ============
  verifyBtn.addEventListener('click', () => {
    if (!tg || !tg.requestContact){
      showToast('لطفاً تلگرامت رو آپدیت کن');
      return;
    }
    tg.requestContact((shared, payload) => {
      if (shared){
        const phone = payload && payload.responseUnsafe && payload.responseUnsafe.contact
          ? payload.responseUnsafe.contact.phone_number
          : 'ثبت شد';
        state.verified = true;
        state.phone = phone;
        render();
        showToast('وریفای شدی ✅');
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      } else {
        showToast('برای ادامه باید شماره رو به اشتراک بذاری');
      }
    });
  });

  // ============ دریافت کانفیگ ============
  getConfigBtn.addEventListener('click', () => {
    if (!state.verified){
      showToast('اول وریفای کن، بعد کانفیگ بگیر');
      if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
      return;
    }
    const chosen = CONFIGS[Math.floor(Math.random()*CONFIGS.length)];
    configText.textContent = chosen;
    ticket.style.display = 'block';
    state.configsReceived += 1;
    render();
    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  });

  // ============ کپی کانفیگ ============
  document.getElementById('copyBtn').addEventListener('click', () => {
    const text = configText.textContent;
    navigator.clipboard?.writeText(text).then(() => showToast('کپی شد 📋'))
      .catch(() => showToast('نشد کپی بشه، دستی کپی کن'));
  });
</script>
</body>
</html>
